<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#FDF8F3">
<title>SingTI 音乐人格测试</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FDF8F3;
  --fg:#4A3728;
  --card:#FFF;
  --card-fg:#4A3728;
  --primary:#E8B4A0;
  --primary-fg:#FFF;
  --secondary:#F5EDE8;
  --secondary-fg:#6B5344;
  --muted:#F5EDE8;
  --muted-fg:#8B7355;
  --accent:#A8D5BA;
  --accent-fg:#2D5A3D;
  --border:#E8DDD5;
  --radius:1rem;
  --star-gold:#FFD700;
  --star-empty:#E8DDD5;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
button{cursor:pointer;border:none;background:none;font-family:inherit}
.app{min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes wave{0%,100%{height:8px}50%{height:36px}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.anim-fade{animation:fadeIn .4s ease-out}
.anim-slide{animation:slideIn .25s ease-out}
.anim-scale{animation:scaleIn .4s ease-out}
.anim-float{animation:float 3s ease-in-out infinite}
.wave-bar{animation:wave .7s ease-in-out infinite;width:6px;background:var(--primary);border-radius:3px}
/* UI */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border-radius:1rem;font-size:1rem;font-weight:600;padding:14px 24px;
  transition:all .2s;width:100%}
.btn-primary{background:var(--primary);color:var(--primary-fg)}
.btn-primary:hover{opacity:.85}
.btn-primary:active{transform:scale(.97)}
.btn-outline{background:var(--card);color:var(--fg);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--primary)}
.btn-destructive{background:#E8A0A0;color:#fff}
.btn-disabled{opacity:.5;pointer-events:none}
.btn-lg{padding:16px 24px;font-size:1.05rem;border-radius:1rem}
.btn-sm{padding:10px 14px;font-size:.85rem;border-radius:.75rem}
/* Progress */
.progress{height:6px;background:var(--secondary);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--primary);border-radius:3px;transition:width .3s ease}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:1.5rem}
/* Glass */
.glass{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.3)}
/* Option button */
.opt-btn{width:100%;padding:18px 20px;border-radius:1rem;text-align:left;font-size:.95rem;font-weight:500;
  border:2px solid var(--border);background:var(--card);transition:all .2s;color:var(--fg);line-height:1.4}
.opt-btn:hover{border-color:var(--primary)}
.opt-btn.selected{border-color:var(--primary);background:rgba(232,180,160,.1)}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;
  background:var(--secondary);font-size:.75rem;font-weight:700;color:var(--muted-fg);margin-right:12px;flex-shrink:0}
.opt-btn.selected .opt-label{background:var(--primary);color:var(--primary-fg)}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:500}
/* Back button */
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.back-btn:hover{background:var(--secondary)}
/* Shareable card */
.share-card{border-radius:1.5rem;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.share-card-inner{padding:28px;text-align:center}
</style>
</head>
<body>

<script type="text/babel">
// ===== DATA =====
const PERSONALITIES = [
  {id:1,name:"音准稽查官",tagline:"你一张嘴，大家都想认真唱",description:"你的耳朵是行走的调音台，细微的偏差都逃不过你的雷达。你不只是唱得好，你听得更精——别人听旋律，你听细节，而且你总能一针见血地指出「刚才那个转音绝了！」。和你一起唱歌的人会不知不觉唱得更认真，因为你的存在本身就是一种品质保证。朋友拉你去KTV的理由很简单：有你在，每个人都想唱好一点。",dims:[0,0,1,0]},
  {id:2,name:"即兴拆迁队",tagline:"每首歌到你手里都是全新版本",description:"你是天生的音乐发明家，任何旋律到你手上都会长出新的翅膀。《小星星》你能用三种不同风格唱完，《生日快乐》在你嘴里永远是一个新版本。和你唱歌永远充满惊喜——因为你不会唱同一个版本两次。好不好听不一定，但气氛永远不会冷场是你的特长。和你唱歌就像开盲盒，永远不知道下一首会是什么画风，但一定不会无聊。",dims:[0,0,1,1]},
  {id:3,name:"人形指挥台",tagline:"世界的节奏，由你来带",description:"你唱歌自有一股掌控力，每一个节拍都有它的位置。跟你合唱的人会不自觉地跟着你的节奏走——不是被迫的，是有你在大家就自然对齐了。你点歌有自己的逻辑和章法，知道什么歌该先唱、什么歌压轴。你不是在唱歌，你是在带气氛。哪怕一个人洗澡唱，花洒都得按你的拍子出水。你的信条：可以唱得不好，但不能唱得乱。",dims:[0,0,0,0]},
  {id:4,name:"KTV气氛组组长",tagline:"你点的不是歌，是全场大合唱",description:"你来KTV的主线任务不是唱，是让每个人都嗨起来。你点的歌都经过精心挑选——副歌必须大家都听过、节奏必须能带气氛。你的KPI不是唱了多少首，而是今晚有多少人拿起了话筒。你经常把自己的歌让给别人唱，因为你的快乐来源不是自己的歌声，是看到别人唱嗨了。你就是那个举着手机打光、带所有人一起摇的人。",dims:[0,0,0,1]},
  {id:5,name:"人间小太阳",tagline:"你唱得开不开心，比好不好听重要一万倍",description:"你一开口，整个包间的气氛都会被你点亮。你唱什么不重要，重要的是你在唱——而且唱得特别投入、特别开心。你的歌单可能跨度很大，但没有人会计较这个，因为你的快乐太有感染力了。你唱跑调的时候大家不是尴尬，是一起笑。你是气氛的引爆点，哪怕只是跟着哼两句，旁边的人也会不自觉地跟着摇起来。你让唱歌这件事变得纯粹——开心就好。",dims:[0,1,1,0]},
  {id:6,name:"灵魂共鸣机",tagline:"你不是在唱歌，是在替大家唱出心里话",description:"你选歌的时机极其精准——总能在气氛刚好时点一首让全场安静下来的歌。你唱歌不是为了炫技，是为了让包间里某个人在某一秒觉得「这首歌就是唱给我的」。你的唱功可能在其次，但你的共情能力是满配。唱完一首，总有人眼眶泛红或低头假装看手机。你是人群中的情感天线，接收所有人的情绪，然后用歌声轻轻回应。",dims:[0,1,1,1]},
  {id:7,name:"歌单收藏家",tagline:"你的歌单绕地球三圈，每首都是故事",description:"从民谣到爵士到K-pop，你的歌单跨度大到让人叹为观止。每首歌你都听过，每首都有一个收藏的理由。别人问你会不会唱某首歌，你永远能接住话题——前奏一起你就能报出歌名。朋友们想找歌第一时间问你：「那首什么什么在哪里能听？」你的脑袋里装着一部音乐搜索引擎，而你最让人佩服的是永远对下一首新歌充满好奇。",dims:[0,1,0,0]},
  {id:8,name:"节奏打印机",tagline:"你的稳，是别人羡慕不来的天赋",description:"你的节奏感稳如心跳，音准堪比仪器。闭上眼睛听你唱，每个音都踩在点上，每个字都清清楚楚。和你一起唱的人心里特别踏实，因为你就是那个永远不会翻车的定心丸。很多人梦寐以求的就是你这种稳定性——在任何场合、任何状态都能稳稳输出。朋友可能嘴上开玩笑说你是「行走的点歌机」，但关键时刻需要有人撑场时，第一个想到的就是你。因为你靠谱。",dims:[0,1,0,1]},
  {id:9,name:"声乐研究员",tagline:"你的音乐知识，比你的歌单还长",description:"你的声乐知识量让专业老师都点赞。胸声、混声、头声的区别你张口就来，一首歌的和弦走向你听一遍就能分析得头头是道。朋友有音乐问题第一个想到你：「这首歌什么调？」「这个转音怎么唱？」你就是一本行走的音乐词典。你对音乐的热爱不止于唱，而是真正去理解它——这份深度，让每一次KTV之旅都因为有你在而显得专业了不少。",dims:[1,0,1,0]},
  {id:10,name:"卧室录音师",tagline:"你对自己的要求，比原唱还要高",description:"你对作品有极高的标准，每一个细节都不放过。别人录一首歌的时间比你短，但是你的每一个版本都是精心打磨过的。唱错一个字？重来。气息不够完美？重来。你觉得不够好的版本就不发——因为你知道自己可以更好。这种追求极致的态度放在任何领域都是稀缺的品质。别人不理解你为什么重录那么多遍，但只有你知道：当你终于听到那个满意的版本时，那种成就感无可替代。",dims:[1,0,1,1]},
  {id:11,name:"音乐解构者",tagline:"你不动声色，但你什么都懂",description:"你听歌不只是听，你在分析、在拆解、在理解。一首歌在你耳朵里不只是好不好听，而是它为什么好听。你是包间里安静听歌的那个，但你一开口说「这歌的鼓点用了反拍」大家都竖起耳朵。你的鉴赏力是朋友们公认的权威——大家讨论音乐时都会下意识看向你，因为你的意见有分量。你证明了一件事：热爱音乐的方式不止一种，懂它和唱它同样了不起。",dims:[1,0,0,0]},
  {id:12,name:"温柔点唱机",tagline:"拿起话筒的那一刻，你变成了另一个人",description:"你平时是包间里话最少的人，从不抢麦，安静地听着别人唱。但话筒一旦到你手上，整个包厢的空气会突然安静下来——因为你的声音跟平时判若两人。你唱歌像深夜电台，温柔到身边的人都不敢大声呼吸。你选的歌常常让在场的人安静下来，有人低头看手机假装没被击中，但那一下沉默已经说明了一切。唱完，你放下话筒，又变回那个安静的自己。深藏不露。",dims:[1,0,0,1]},
  {id:13,name:"黄昏氛围组",tagline:"你在浴室的演出不输专业歌手——虽然观众只有花洒",description:"你唱歌很挑环境：要有合适的氛围、无人打扰的空间、最好再有点水蒸气。你在独处时的发挥可以非常惊艳——但你不太习惯让别人听到这一面。你的舒适区和舞台感成反比：人越多你越收，一个人的时候反而能完全放开。但没关系，你的个人演唱会常年满座——花洒是首席听众，浴巾是忠实粉丝。他们从不评价你，但他们见证了你的每一次高光时刻。",dims:[1,1,1,0]},
  {id:14,name:"隐形主唱",tagline:"朋友圈隐藏高手，解锁需要一点熟悉和信任",description:"你不轻易开口，但一开口就有惊喜。平时安安静静，不争不抢，但如果你愿意拿起话筒，往往会让熟悉你的人眼前一亮。唱完一曲，朋友们会惊讶地发现你还有这一面。然后你笑着放下话筒，回到自己的节奏里。你不是那种一上来就展示所有的人——你的才华需要一点点信任和舒适感才能被解锁。而每一个解锁过的人，都会觉得这是一种荣幸。",dims:[1,1,1,1]},
  {id:15,name:"浴室艺术家",tagline:"打开花洒的那一刻，你就是全场最亮的星",description:"你的个人音乐会在浴室每天准时开演。花洒一开，你就是全场最亮的星——共鸣、气息、情感全部在线。你最大的快乐是在没人打扰的空间里，完完整整地唱完一首歌。你偶尔也会想，什么时候能把浴室里的感觉带到外面去。每次你鼓起勇气走到客厅，看到有人，勇气还需要再酝酿一下。但没关系，花洒永远是你的忠实搭档，它听过你最好的版本。",dims:[1,1,0,0]},
  {id:16,name:"流浪歌者",tagline:"你唱歌靠的不是固定模板，是当下的心情",description:"你唱歌不追求标准答案，每一遍都是全新演绎。你自由、随性、不受约束——开口前你也不知道会唱成什么样，但这种未知本身就是乐趣。和你唱歌永远不会无聊，因为你永远不按常理出牌。朋友们早就习惯了你的自在风格，甚至开始期待你下一首歌会带来什么惊喜。你的快乐不在于唱得有多准，而在于唱得有多自由——这大概就是唱歌最本来的样子吧。",dims:[1,1,0,1]},
];
const QUESTIONS = [
  {id:1,text:"小组聚餐完有人提议「走！去KTV！」，你内心真实的第一个念头是？",optionA:"好耶！！今晚不唱到打烊不回家——已经开始在脑子里过歌单了",optionB:"啊……好累……但是不去又不好……希望今天不用唱歌——已经开始策划怎么当观众了",optionC:"去呗，反正也没别的事",dim:0,dirWeight:true},
  {id:2,text:"《死了都要爱》的最高音要来了，你的策略是？",optionA:"深吸一口气调动丹田之力——这把必须顶上去，这是尊严之战",optionB:"话筒拉远身体后仰，用一个艺术性的破音滑过去——气势到了就行",optionC:"降到安全调，自己的嗓子重要",dim:1,dirWeight:true},
  {id:3,text:"你被一首歌打动的原因通常是什么？",optionA:"歌词太绝了——「这写的不就是我吗？」然后emo一整晚",optionB:"旋律或编曲太牛了——这个转音、这个和弦进行，简直是艺术品",optionC:"看情况，有时候是词有时候是曲",dim:2,dirWeight:true},
  {id:4,text:"KTV里有人开始唱你的专属必点曲目，你？",optionA:"立刻拿起另一支话筒加入——「这首没我不行」，而且越唱越大声反客为主",optionB:"默默放下话筒微笑着听对方唱完——虽然内心在呐喊「我唱得比他好」",optionC:"等这首结束再看我要不要再点一遍",dim:3,dirWeight:true},
  {id:5,text:"你在电梯里听到耳机里放到一首嗨歌，身体反应是？",optionA:"忍不住抖腿点头甚至小声跟唱，完全忘了电梯里有别人",optionB:"内心已经蹦迪了但表面稳如老狗，最多眼神不自觉地眯一下",optionC:"稍微有点律动但控制住了",dim:0},
  {id:6,text:"被朋友夸「你唱歌好好听」，你的标准回答是？",optionA:"「谢谢，我练了很久的」——内心：你终于发现了，欣慰",optionB:"「没有没有没有，全靠运气」——内心：再夸我就要钻地缝了",optionC:"「哈哈谢谢」——开心但淡定",dim:1},
  {id:7,text:"你在KTV唱情歌时，你的状态更接近？",optionA:"闭上眼睛完全沉浸在情绪里，感觉自己就是MV主人公，世界只剩我和这首歌",optionB:"眼睛死盯着歌词倒计时，心里默念「这句不要走音这句不要走音」",optionC:"放松但保持注意力，该投入投入该收就收",dim:2},
  {id:8,text:"当你点的歌被排在很后面，你会？",optionA:"不动声色地点「置顶」，然后假装无事发生——我的歌不能等",optionB:"等着呗，反正也不急——甚至经常点完就忘了自己点过",optionC:"看一下还要等几首，太久就去催一下",dim:3},
  {id:9,text:"为了在朋友面前唱好一首新歌，你私下会练多少遍？",optionA:"至少五十遍。每个字的气息、每个转音、每个共鸣位置——都要形成肌肉记忆",optionB:"最多两三遍。旋律差不多记住了就行，剩下的交给现场发挥",optionC:"十来遍，能完整顺下来就行",dim:1},
  {id:10,text:"你的KTV必点歌单整体风格更偏向？",optionA:"全是情歌——不把在场的人唱沉默算我输",optionB:"全是嗨歌——不把包间天花板掀了算我输",optionC:"混搭，看当天心情和在场的人",dim:2},
  {id:11,text:"走路时哼歌不小心被路人听到，你？",optionA:"索性唱大声一点——让路人免费听一场演唱会，是他赚到了",optionB:"立刻闭嘴、低头、加速——希望他没听到我走音的那一句",optionC:"有点尴尬但假装无事发生继续走",dim:0},
  {id:12,text:"KTV里有人切了你正在唱的歌，你什么反应？",optionA:"「？？？？我还没进副歌呢！」——然后默默把歌又置顶了，切一次置顶一次",optionB:"「好吧好吧让ta唱」——虽然心里在滴血但表面显得毫不在意",optionC:"「这歌也差不多了」，换就换吧",dim:3},
  {id:13,text:"你更认同哪个观点？",optionA:"「唱歌最重要的是感情——走音怎么了？感情到位了那都是艺术处理」",optionB:"「唱歌最重要的是技术——音都不准你谈什么感情？先练准了再说」",optionC:"都重要，看唱什么歌",dim:2},
  {id:14,text:"一群人聊天时突然有人递话筒到你面前：「来一首！」，你内心是？",optionA:"来就来！正好有首练好的没机会展示呢——自信接过话筒",optionB:"大脑瞬间空白：我是谁我在哪我该唱什么完了完了——但表面还是微笑着接过来",optionC:"有点紧张，但不唱也不礼貌，硬着头皮上",dim:0},

  {id:16,text:"你最理想的唱歌场景是？",optionA:"聚光灯下、万人面前、所有人都听我唱——我天生属于舞台",optionB:"深夜一个人戴着耳机，全世界只剩我和音乐——这才是唱歌该有的样子",optionC:"三五好友，轻松的氛围，想唱就唱不想唱就听",dim:0},
];
function calculateSingTI(input){
  const scores={};PERSONALITIES.forEach(p=>scores[p.id]=0);
  QUESTIONS.forEach(q=>{
    const ans=input.answers[q.id];if(!ans||ans==='C')return; // C=中立,不计分
    const pts=q.dirWeight?2:1,side=ans==='A'?0:1;
    PERSONALITIES.forEach(p=>{if(p.dims[q.dim]===side)scores[p.id]+=pts});
  });
  PERSONALITIES.forEach(p=>{
    if(input.voiceIsLoud&&p.dims[0]===0)scores[p.id]+=1;
    else if(!input.voiceIsLoud&&p.dims[0]===1)scores[p.id]+=1;
  });
  let winner=null,best=-1;
  PERSONALITIES.forEach(p=>{const s=scores[p.id];if(s>best){best=s;winner=p}});
  return winner||PERSONALITIES[0];
}

function App(){
  const [step,setStep]=React.useState(stepFromUrl());
  const [qIdx,setQIdx]=React.useState(0);
  const [answers,setAnswers]=React.useState({});
  const [recording,setRecording]=React.useState(false);
  const [recordDone,setRecordDone]=React.useState(false);
  const [voiceLoud,setVoiceLoud]=React.useState(false);
  const [errorMsg,setErrorMsg]=React.useState('');
  const [result,setResult]=React.useState(null);
  const [copied,setCopied]=React.useState(false);
  const streamRef=React.useRef(null);
  const volRef=React.useRef([]);

  function stepFromUrl(){
    const p=new URLSearchParams(window.location.search);
    return p.get('singti')||p.get('p')?'shared':'intro';
  }

  const sharedId=React.useMemo(()=>{
    const p=new URLSearchParams(window.location.search);
    const id=p.get('singti')||p.get('p');
    return id?Number(id):null;
  },[]);

  const sharedPersonality=sharedId?PERSONALITIES.find(p=>p.id===sharedId):null;

  const startRecording=async()=>{
    try{
      setErrorMsg('');setRecording(true);volRef.current=[];
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      const ctx=new AudioContext();
      const src=ctx.createMediaStreamSource(stream);
      const an=ctx.createAnalyser();an.fftSize=256;
      src.connect(an);
      const data=new Uint8Array(an.frequencyBinCount);
      const iv=setInterval(()=>{
        an.getByteTimeDomainData(data);
        let sum=0;for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v;}
        volRef.current.push(Math.sqrt(sum/data.length));
      },100);
      const rec=new MediaRecorder(stream);
      rec.onstop=()=>{
        clearInterval(iv);
        const avg=volRef.current.reduce((a,b)=>a+b,0)/volRef.current.length;
        setVoiceLoud(avg>0.08);
        setRecordDone(true);setRecording(false);
        stream.getTracks().forEach(t=>t.stop());streamRef.current=null;ctx.close();
      };
      rec.start();
      setTimeout(()=>{if(rec.state==='recording')rec.stop();},7000);
    }catch(e){setErrorMsg('无法访问麦克风，请允许麦克风权限后重试');setRecording(false)}
  };

  const stopRecording=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    const avg=volRef.current.reduce((a,b)=>a+b,0)/volRef.current.length||0;
    setVoiceLoud(avg>0.08);setRecordDone(true);setRecording(false);
  };

  const handleAnswer=(key)=>{setAnswers(prev=>({...prev,[QUESTIONS[qIdx].id]:key}))};
  const answered=qIdx<QUESTIONS.length&&answers[QUESTIONS[qIdx].id]!==undefined;
  const showSubmit=qIdx===QUESTIONS.length-1&&answered;

  const handleNext=()=>{if(qIdx<QUESTIONS.length-1)setQIdx(p=>p+1)};
  const handlePrev=()=>{if(qIdx>0)setQIdx(p=>p-1)};

  const handleSubmit=()=>{
    const r=calculateSingTI({answers,voiceIsLoud:voiceLoud});
    setResult(r);setStep('result');
    window.history.replaceState(null,'',`?singti=${r.id}`);
  };

  const handleCopyLink=()=>{
    const url=`${window.location.origin}${window.location.pathname}?singti=${result.id}`;
    navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)});
  };

  const handleReset=()=>{
    setStep('intro');setQIdx(0);setAnswers({});setRecordDone(false);setVoiceLoud(false);setErrorMsg('');setResult(null);
    window.history.replaceState(null,'',window.location.pathname);
  };

  const handleStartTest=()=>{
    setStep('intro');
    window.history.replaceState(null,'',window.location.pathname);
  };

  // === SHARED CARD ===
  if(sharedPersonality&&step==='shared'){
    const h=sharedPersonality.id*22;

        <div className="share-card-inner">

  // === INTRO ===

        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:300}}>

      </div>
    </div>;
  }

  // === RECORDING ===
  if(step==='recording'){
    return <div className="app">
      <div style={{padding:'16px 20px'}}>
        <button className="back-btn" onClick={()=>setStep('intro')}>{Icons.chevronLeft}</button>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px',textAlign:'center',gap:24}}>

          {recording
            ?<div className="anim-float" style={{color:'var(--primary)',width:48,height:48}}>{Icons.volume}</div>
            :recordDone
              ?<div style={{width:48,height:48,borderRadius:'50%',background:'rgba(168,213,186,.3)',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:24}}>✓</span></div>

        </div>
        <div>
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:12}}>

          </h2>
          {!recordDone&&!recording&&<p style={{fontSize:14,color:'var(--muted-fg)',maxWidth:280}}>用你最自然的声音唱开头两句，大约 7 秒就好</p>}
          {recording&&<div><p style={{fontSize:18,fontWeight:600,marginBottom:16}}>一闪一闪亮晶晶，满天都是小星星...</p><RecordingWave/></div>}
          {recordDone&&<p style={{fontSize:14,color:'var(--muted-fg)'}}>{voiceLoud?"声音挺大嘛，是个外放型选手":"声音小小的，是内敛派啊"}</p>}
        </div>
        {errorMsg&&<p style={{fontSize:13,color:'#E8A0A0'}}>{errorMsg}</p>}
        {!recordDone
          ?<button className={`btn btn-lg ${recording?'btn-destructive':'btn-primary'}`} style={{maxWidth:300}} onClick={recording?stopRecording:startRecording}>
              {recording?"录好了 🎤":"开始录音"}
            </button>

      <div style={{padding:'24px 20px 32px'}}>
        {showSubmit
          ?<button className="btn btn-primary btn-lg" onClick={handleSubmit}>查看我的 SingTI ✨</button>
          :<button className={`btn btn-primary btn-lg ${!answered?'btn-disabled':''}`} disabled={!answered} onClick={handleNext}>
              {answered?"下一题":"请选择一个选项"}
            </button>}
      </div>
    </div>;
  }

  // === RESULT ===
  if(step==='result'&&result){
    const h=result.id*22;
    return <div className="app">
      <div style={{flex:1,overflow:'auto',padding:'16px 16px 8px'}}>
        <div className="share-card anim-scale">
          <div style={{height:8,background:`linear-gradient(90deg,hsl(${h},60%,75%),hsl(${h+30},55%,80%))`}}/>
          <div className="share-card-inner">
            <p style={{fontSize:10,letterSpacing:3,color:`hsl(${h},40%,70%)`,marginBottom:16}}>五音不全 × SingTI</p>
            <div style={{display:'flex',justifyContent:'center'}}><CharacterAvatar personality={result} size={120}/></div>
            <p style={{fontSize:11,color:'var(--muted-fg)',letterSpacing:2,marginTop:16,marginBottom:4,textTransform:'uppercase'}}>音乐人格</p>
            <h2 style={{fontSize:28,fontWeight:900,marginBottom:6}}>{result.name}</h2>
            <p style={{fontSize:14,color:'var(--muted-fg)',marginBottom:20,lineHeight:1.5}}>「{result.tagline}」</p>
            <div className="badge" style={{background:'rgba(232,180,160,.1)',color:'var(--primary)',marginBottom:20,display:'inline-flex'}}>
              {Icons.mic} {voiceLoud?"声音外放型":"声音内敛型"}
            </div>
            <div style={{background:'var(--secondary)',borderRadius:'1rem',padding:20,textAlign:'left',marginBottom:20,opacity:.8}}>
              <p style={{fontSize:14,lineHeight:1.7,color:'var(--secondary-fg)'}}>{result.description}</p>
            </div>
            <p style={{fontSize:10,color:'var(--muted-fg)',opacity:.6,letterSpacing:1}}>— 唱一段《小星星》，测测你的音乐人格 —</p>
          </div>
        </div>
        {/* Stats */}
        <div className="card" style={{marginTop:12,padding:16}}>
          <p style={{fontSize:12,color:'var(--muted-fg)',fontWeight:500,marginBottom:12}}>你的测试数据</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{padding:12,borderRadius:12,background:'rgba(245,237,232,.5)',textAlign:'center'}}>
              <p style={{fontSize:20,fontWeight:700}}>{PERSONALITIES.findIndex(p=>p.id===result.id)+1}</p>
              <p style={{fontSize:12,color:'var(--muted-fg)'}}>/ 16 种人格</p>
            </div>
            <div style={{padding:12,borderRadius:12,background:'rgba(245,237,232,.5)',textAlign:'center'}}>
              <p style={{fontSize:20,fontWeight:700}}>{Object.keys(answers).length}</p>
              <p style={{fontSize:12,color:'var(--muted-fg)'}}>/ 16 题已答</p>
            </div>
          </div>
        </div>
        {/* Share actions */}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={handleCopyLink}>
            {copied?<>{Icons.check} 已复制</>:<>{Icons.copy} 复制链接</>}
          </button>
          <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>{
            const text=`我测出了我的 SingTI 音乐人格：${result.name} ——「${result.tagline}」\n\n来测测你的音乐人格！${window.location.origin}${window.location.pathname}?singti=${result.id}`;
            if(navigator.share)navigator.share({title:'SingTI 音乐人格',text});
            else navigator.clipboard.writeText(text).then(()=>alert('已复制到剪贴板！'));
          }}>
            {Icons.share} 分享
          </button>
        </div>
      </div>
      {/* Bottom */}
      <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:12}}>
        <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={handleReset}>{Icons.rotate} 重测</button>
      </div>
    </div>;
  }

  return null;
}

// ===== RENDER =====
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<React.StrictMode><App/></React.StrictMode>);
</script>
</body>
</html>
